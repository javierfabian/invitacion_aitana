<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Mágica</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root {
  font-size: 16px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 2rem 1rem;
  background: linear-gradient(135deg, #ffe5ec, #f3e8ff, #dbeafe);
  position: relative;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle, #ffffff 1px, transparent 1px),
    radial-gradient(circle, #ffd700 1px, transparent 1px);
  background-size: 3rem 3rem, 4rem 4rem;
  animation: moveSparkles 10s linear infinite;
  opacity: .45;
  pointer-events: none;
}

@keyframes moveSparkles {
  0% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-10px);
  }
  100% {
    transform: translateY(0);
  }
}

.container {
  position: relative;
  z-index: 2;
  width: min(100%, 44rem);
  display: grid;
  place-items: center;
  gap: 2rem;
  padding: 0 0.5rem;
}

.screen1 {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.25rem;
  width: 100%;
  text-align: center;
}

.envelope-wrapper {
  position: relative;
  cursor: pointer;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-12px);
  }
}

.envelope {
  width: min(23rem, 90vw);
  aspect-ratio: 300 / 190;
  background: #ffb3c6;
  position: relative;
  border-radius: 0 0 0.875rem 0.875rem;
  box-shadow: 0 0.625rem 1.875rem rgba(0, 0, 0, .15);
  max-width: 23rem;
}

.envelope::before {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  border-left: 12.5rem solid transparent;
  border-right: 12.5rem solid transparent;
  border-top: 7.5rem solid #ff8fab;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  transform-origin: top;
  transition: .6s;
  z-index: 2;
}

.seal {
  position: absolute;
  top: 4.5rem;
  left: 50%;
  transform: translateX(-50%);
  width: 4.5rem;
  height: 4.5rem;
  border-radius: 50%;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 0.3125rem 0.9375rem rgba(0, 0, 0, .15);
  z-index: 5;
  overflow: hidden;
}

.seal img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.tap {
  margin-top: 1.5rem;
  font-weight: 600;
  color: #7b2cbf;
  text-align: center;
  animation: pulse 2s infinite;
  line-height: 1.5;
  font-size: 1rem;
}

@keyframes pulse {
  50% {
    opacity: .5;
  }
}

.open .envelope::before {
  transform: translateX(-50%) rotateX(180deg);
}

.card {
  display: none;
  width: min(100%, 42rem);
  background: rgba(255, 255, 255, .92);
  backdrop-filter: blur(8px);
  padding: 1.75rem;
  border-radius: 1.75rem;
  text-align: center;
  box-shadow: 0 0.9375rem 2.5rem rgba(0, 0, 0, .15);
  animation: showCard .8s ease;
}

@keyframes showCard {
  from {
    opacity: 0;
    transform: translateY(2.5rem) scale(.88);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.unicorn-img {
  width: min(12rem, 55vw);
  max-width: 14rem;
  margin: 0 auto;
  filter: drop-shadow(0 0.5rem 0.9375rem rgba(255, 105, 180, .25));
}

.title {
  margin-top: 0.75rem;
  font-size: clamp(1.75rem, 5vw, 2.75rem);
  color: #ff4d8d;
  font-weight: 700;
  line-height: 1.1;
}

.subtitle {
  margin-top: 0.75rem;
  font-size: clamp(1rem, 2.5vw, 1.1rem);
  color: #666;
  line-height: 1.7;
}

.info {
  margin-top: 1.25rem;
  background: #fff0f6;
  padding: 1.25rem;
  border-radius: 1.125rem;
  line-height: 1.9;
  color: #5c5470;
  font-weight: 500;
  text-align: left;
}

.input {
  width: 100%;
  padding: 1rem;
  border-radius: 1rem;
  border: .125rem solid #ffd6e0;
  margin-top: 1.375rem;
  font-size: 1rem;
  outline: none;
  text-align: center;
}

.input:focus {
  border-color: #ff8fab;
}

.button {
  margin-top: 1.25rem;
  width: 100%;
  padding: 1rem;
  border: none;
  border-radius: 1rem;
  background: linear-gradient(90deg, #ff8fab, #cdb4db, #a0c4ff);
  color: white;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform .3s ease, box-shadow .3s ease;
  box-shadow: 0 0.5rem 1.125rem rgba(255, 105, 180, .3);
}

.button:hover {
  transform: translateY(-.15rem) scale(1.01);
}

@media (min-width: 40rem) {
  .container {
    gap: 2.5rem;
    padding: 0 1rem;
  }

  .envelope {
    width: min(24rem, 85vw);
  }

  .envelope::before {
    border-left: 13rem solid transparent;
    border-right: 13rem solid transparent;
    border-top: 8rem solid #ff8fab;
  }

  .seal {
    width: 5rem;
    height: 5rem;
    top: 4.75rem;
  }

  .card {
    padding: 2rem;
  }

  .info {
    padding: 1.5rem;
  }
}

@media (min-width: 56rem) {
  body {
    padding: 3rem 2rem;
  }

  .container {
    grid-template-columns: 1fr;
    gap: 3rem;
  }

  .envelope {
    width: min(25rem, 70vw);
  }

  .envelope::before {
    border-left: 13.5rem solid transparent;
    border-right: 13.5rem solid transparent;
    border-top: 8.5rem solid #ff8fab;
  }

  .card {
    padding: 2.5rem;
    border-radius: 2rem;
  }

  .title {
    font-size: clamp(2.2rem, 2.8vw, 3rem);
  }

  .subtitle {
    font-size: 1.05rem;
  }

  .input,
  .button {
    font-size: 1rem;
  }
}

@media (min-width: 80rem) {
  .container {
    width: 42rem;
  }

  .envelope {
    width: 26rem;
  }

  .envelope::before {
    border-left: 14rem solid transparent;
    border-right: 14rem solid transparent;
    border-top: 8.75rem solid #ff8fab;
  }

  .card {
    width: 100%;
  }
}

</style>
</head>
<body>

<div class="container">

<div class="screen1" id="screen1">

<div class="envelope-wrapper" id="envelope" onclick="openInvitation()">
<div class="envelope"></div>

<div class="seal">
<img src="ASSETS\unicornio.jpeg" alt="Unicornio">
</div>

</div>

<p class="tap">✨ Toca el sobre para abrir tu invitación ✨</p>

</div>

<div class="card" id="card">

<img src="ASSETS\unicornio.jpeg" class="unicorn-img" alt="Unicornio mágico">

<h1 class="title">EL PRIMER AÑITO DE AITANA</h1>

<p class="subtitle">
Te espero para compartir una tarde en familia. Bendiciones 🦄🌈
</p>

<div class="info">
📅 Sábado 30 de Mayo<br>
⏰ 16:00 hs<br>
📍 Mi casita-chacra 253 calle 139a y avnda. Bustamante



</div>

<input type="text" id="nombre" class="input" placeholder="Escribe tu nombre">

<button class="button" onclick="confirmar()">
✨ Confirmar Asistencia ✨
</button>

</div>

</div>

<script>

const TELEFONO = '5493764288106';

function openInvitation(){

const envelope = document.getElementById('envelope');
envelope.classList.add('open');

setTimeout(()=>{
document.getElementById('screen1').style.display='none';
document.getElementById('card').style.display='block';
},600)

}

function confirmar(){

const nombre = document.getElementById('nombre').value.trim();

if(nombre === ''){
alert('Por favor escribe tu nombre');
return;
}

const mensaje = encodeURIComponent(
`✨ Hola! ${nombre} confirma asistencia al cumpleaños 🦄🌈`
)

window.open(`https://wa.me/${TELEFONO}?text=${mensaje}`,'_blank');

}

</script>

</body>
</html>
