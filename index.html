<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Mágica</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root {
  font-size: 16px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  min-height: 100dvh;
  overflow-x: hidden;
  display: grid;
  place-items: center;
  padding: 2rem 1rem;
  background: linear-gradient(135deg, #ffe5ec, #f3e8ff, #dbeafe);
  position: relative;
}

/* fondo animado */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle, #ffffff 1px, transparent 1px),
    radial-gradient(circle, #ffd700 1px, transparent 1px);
  background-size: 3rem 3rem, 4rem 4rem;
  animation: moveSparkles 10s linear infinite;
  opacity: .45;
  pointer-events: none;
}

@keyframes moveSparkles {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* CONTENEDOR */
.container {
  position: relative;
  z-index: 2;
  width: min(100%, 44rem);
  display: grid;
  place-items: center;
  gap: 2rem;
}

/* SCREEN 1 */
.screen1 {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.25rem;
  width: 100%;
  text-align: center;
}

/* SOBRE */
.envelope-wrapper {
  position: relative;
  cursor: pointer;
  animation: float 3s ease-in-out infinite;
  will-change: transform;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.envelope {
  width: min(23rem, 90vw);
  aspect-ratio: 300 / 190;
  background: #ffb3c6;
  position: relative;
  border-radius: 0 0 0.875rem 0.875rem;
  box-shadow: 0 0.625rem 1.875rem rgba(0,0,0,.15);
}

/* tapa */
.envelope::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff8fab;
  clip-path: polygon(0 0, 100% 0, 50% 70%);
  top: 0;
  left: 0;
  transform-origin: top;
  transition: .6s ease;
}

.open .envelope::before {
  transform: rotateX(180deg);
}

/* sello */
.seal {
  position: absolute;
  top: 4.5rem;
  left: 50%;
  transform: translateX(-50%);
  width: 4.5rem;
  height: 4.5rem;
  border-radius: 50%;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 0.3125rem 0.9375rem rgba(0,0,0,.15);
  overflow: hidden;
}

.seal img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* texto tap */
.tap {
  margin-top: 1.5rem;
  font-weight: 600;
  color: #7b2cbf;
  animation: pulse 2s infinite;
  font-size: 1rem;
}

@keyframes pulse {
  50% { opacity: .5; }
}

/* CARD */
.card {
  display: none;
  width: 100%;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(8px);
  padding: 1.75rem;
  border-radius: 1.75rem;
  text-align: center;
  box-shadow: 0 0.9375rem 2.5rem rgba(0,0,0,.15);
  animation: showCard .8s ease;
}

@keyframes showCard {
  from { opacity: 0; transform: translateY(2rem) scale(.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.unicorn-img {
  width: min(12rem, 55vw);
  margin: 0 auto;
  filter: drop-shadow(0 0.5rem 0.9375rem rgba(255,105,180,.25));
}

.title {
  margin-top: .75rem;
  font-size: clamp(1.75rem, 5vw, 2.75rem);
  color: #ff4d8d;
  font-weight: 700;
}

.subtitle {
  margin-top: .75rem;
  font-size: clamp(1rem, 2.5vw, 1.1rem);
  color: #666;
  line-height: 1.7;
}

.info {
  margin-top: 1.25rem;
  background: #fff0f6;
  padding: 1.25rem;
  border-radius: 1.125rem;
  line-height: 1.9;
  color: #5c5470;
  font-weight: 500;
  text-align: left;
}

/* INPUT */
.input {
  width: 100%;
  padding: 1rem;
  border-radius: 1rem;
  border: .125rem solid #ffd6e0;
  margin-top: 1.375rem;
  font-size: 1rem;
  text-align: center;
  outline: none;
}

.input:focus {
  border-color: #ff8fab;
}

/* BUTTON */
.button {
  margin-top: 1.25rem;
  width: 100%;
  padding: 1rem;
  border: none;
  border-radius: 1rem;
  background: linear-gradient(90deg, #ff8fab, #cdb4db, #a0c4ff);
  color: white;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform .25s ease;
  box-shadow: 0 0.5rem 1.125rem rgba(255,105,180,.3);
}

.button:hover {
  transform: translateY(-2px) scale(1.01);
}

/* RESPONSIVE FIXES */
@media (min-width: 40rem) {
  .card { padding: 2rem; }
}

@media (min-width: 56rem) {
  body { padding: 3rem 2rem; }
  .card { padding: 2.5rem; border-radius: 2rem; }
}

@media (min-width: 80rem) {
  .container { width: 42rem; }
}

/* MOBILE FIX CRÍTICO */
@media (max-width: 480px) {
  body {
    padding: 1.25rem 0.75rem;
  }

  .card {
    padding: 1.25rem;
  }

  .info {
    padding: 1rem;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="screen1" id="screen1">

    <div class="envelope-wrapper" id="envelope" onclick="openInvitation()">
      <div class="envelope"></div>

      <div class="seal">
        <img src="ASSETS\unicornio.jpeg" alt="Unicornio">
      </div>
    </div>

    <p class="tap">✨ Toca el sobre para abrir tu invitación ✨</p>
  </div>

  <div class="card" id="card">

    <img src="ASSETS\unicornio.jpeg" class="unicorn-img" alt="Unicornio mágico">

    <h1 class="title">EL PRIMER AÑITO DE AITANA</h1>

    <p class="subtitle">
      Te espero para compartir una tarde en familia. Bendiciones 🦄🌈
    </p>

    <div class="info">
      📅 Sábado 30 de Mayo<br>
      ⏰ 16:00 hs<br>
      📍 Mi casita-chacra 253 calle 139a y avnda. Bustamante
    </div>

    <input type="text" id="nombre" class="input" placeholder="Escribe tu nombre">

    <button class="button" onclick="confirmar()">
      ✨ Confirmar Asistencia ✨
    </button>

  </div>

</div>

<script>

const TELEFONO = '5493764288106';

function openInvitation(){
  const envelope = document.getElementById('envelope');
  envelope.classList.add('open');

  setTimeout(()=>{
    document.getElementById('screen1').style.display='none';
    document.getElementById('card').style.display='block';
  },600);
}

function confirmar(){
  const nombre = document.getElementById('nombre').value.trim();

  if(nombre === ''){
    alert('Por favor escribe tu nombre');
    return;
  }

  const mensaje = encodeURIComponent(
    `✨ Hola! ${nombre} confirma asistencia al cumpleaños 🦄🌈`
  );

  window.open(`https://wa.me/${TELEFONO}?text=${mensaje}`,'_blank');
}

</script>

</body>
</html>
