<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Mágica</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffe5ec,#f3e8ff,#dbeafe);
position:relative;
}

/* Brillos */
body::before{
content:"";
position:absolute;
inset:0;
background-image:
radial-gradient(circle,#ffffff 1px,transparent 1px),
radial-gradient(circle,#ffd700 1px,transparent 1px);
background-size:40px 40px,60px 60px;
animation:moveSparkles 10s linear infinite;
opacity:.5;
}

@keyframes moveSparkles{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.container{
position:relative;
z-index:2;
width:100%;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* SOBRE */
.screen1{
display:flex;
flex-direction:column;
align-items:center;
}

.envelope-wrapper{
position:relative;
cursor:pointer;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

.envelope{
width:300px;
height:190px;
background:#ffb3c6;
position:relative;
border-radius:0 0 14px 14px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.envelope::before{
content:"";
position:absolute;
width:0;
height:0;
border-left:150px solid transparent;
border-right:150px solid transparent;
border-top:100px solid #ff8fab;
top:0;
transform-origin:top;
transition:.6s;
z-index:2;
}

.seal{
position:absolute;
top:70px;
left:50%;
transform:translateX(-50%);
width:75px;
height:75px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
z-index:5;
overflow:hidden;
}

.seal img{
width:100%;
height:100%;
object-fit:cover;
}

.tap{
margin-top:25px;
font-weight:600;
color:#7b2cbf;
text-align:center;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{opacity:.5}
}

.open .envelope::before{
transform:rotateX(180deg);
}

/* TARJETA */
.card{
display:none;
width:100%;
max-width:420px;
background:rgba(255,255,255,.92);
backdrop-filter:blur(8px);
padding:28px;
border-radius:28px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.15);
animation:showCard .8s ease;
}

@keyframes showCard{
from{
opacity:0;
transform:translateY(40px) scale(.8);
}

to{
opacity:1;
transform:translateY(0) scale(1);
}
}

.unicorn-img{
width:190px;
margin:auto;
filter:drop-shadow(0 8px 15px rgba(255,105,180,.25));
}

.title{
margin-top:10px;
font-size:2rem;
color:#ff4d8d;
font-weight:700;
}

.subtitle{
margin-top:8px;
font-size:1rem;
color:#666;
line-height:1.6;
}

.info{
margin-top:20px;
background:#fff0f6;
padding:18px;
border-radius:18px;
line-height:1.8;
color:#5c5470;
font-weight:500;
}

.input{
width:100%;
padding:14px;
border-radius:14px;
border:2px solid #ffd6e0;
margin-top:22px;
font-size:1rem;
outline:none;
text-align:center;
}

.input:focus{
border-color:#ff8fab;
}

.button{
margin-top:18px;
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#ff8fab,#cdb4db,#a0c4ff);
color:white;
font-size:1rem;
font-weight:700;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 18px rgba(255,105,180,.3);
}

.button:hover{
transform:translateY(-2px) scale(1.01);
}

@media(max-width:480px){
.envelope{
width:260px;
height:170px;
}

.envelope::before{
border-left:130px solid transparent;
border-right:130px solid transparent;
}

.card{
padding:22px;
}

.title{
font-size:1.7rem;
}
}

</style>
</head>
<body>

<div class="container">

<div class="screen1" id="screen1">

<div class="envelope-wrapper" id="envelope" onclick="openInvitation()">
<div class="envelope"></div>

<div class="seal">
<img src="ASSETS\unicornio.jpeg" alt="Unicornio">
</div>

</div>

<p class="tap">✨ Toca el sobre para abrir tu invitación ✨</p>

</div>

<div class="card" id="card">

<img src="ASSETS\unicornio.jpeg" class="unicorn-img" alt="Unicornio mágico">

<h1 class="title">EL PRIMER AÑITO DE AITANA</h1>

<p class="subtitle">
Te espero para compartir una tarde en familia. Bendiciones 🦄🌈
</p>

<div class="info">
📅 Sábado 30 de Mayo<br>
⏰ 16:00 hs<br>
📍 Mi casita-chacra 253 calle 139a y avnda. Bustamante



</div>

<input type="text" id="nombre" class="input" placeholder="Escribe tu nombre">

<button class="button" onclick="confirmar()">
✨ Confirmar Asistencia ✨
</button>

</div>

</div>

<script>

const TELEFONO = '5493764288106';

function openInvitation(){

const envelope = document.getElementById('envelope');
envelope.classList.add('open');

setTimeout(()=>{
document.getElementById('screen1').style.display='none';
document.getElementById('card').style.display='block';
},600)

}

function confirmar(){

const nombre = document.getElementById('nombre').value.trim();

if(nombre === ''){
alert('Por favor escribe tu nombre');
return;
}

const mensaje = encodeURIComponent(
`✨ Hola! ${nombre} confirma asistencia al cumpleaños 🦄🌈`
)

window.open(`https://wa.me/${TELEFONO}?text=${mensaje}`,'_blank');

}

</script>

</body>
</html>
